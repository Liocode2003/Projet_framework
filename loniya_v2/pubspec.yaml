name: loniya_v2
description: LONIYA V2 - Plateforme éducative offline-first pour le Burkina Faso
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  pointycastle: ^3.7.4

  # Network & Connectivity
  connectivity_plus: ^5.0.2
  http: ^1.2.1
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  multicast_dns: ^0.3.2+1

  # Text To Speech
  flutter_tts: ^3.8.5

  # PDF export
  pdf: ^3.10.8
  printing: ^5.12.0

  # Compression
  archive: ^3.4.10

  # UI components
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Media input
  image_picker: ^1.1.2
  record: ^5.1.2

  # Utilities
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.3.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/mock_data/
    - assets/lottie/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
